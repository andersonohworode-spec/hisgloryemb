<!DOCTYPE html>
<html>
<head>
  <title>Church Member Registration</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: white;
    }

    form {
      background: white;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    input {
      width: 250px;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #4facfe;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #007bff;
    }

    ul {
      margin-top: 20px;
      color: white;
      list-style: none;
      padding: 0;
    }

    li {
      background: rgba(255,255,255,0.2);
      margin: 5px;
      padding: 10px;
      border-radius: 5px;
    }
  </style>

</head>

<body>

  <h1>Church Member Registration</h1>

  <form id="memberForm">
    <input type="text" id="name" placeholder="Enter Name" required><br>
    <input type="text" id="phone" placeholder="Enter Phone Number" required><br>
    <input type="text" id="department" placeholder="Department" required><br>

    <button type="submit">Register</button>
  </form>

  <h2 style="color:white;">Registered Members</h2>
  <ul id="membersList"></ul>

  <script>
    const form = document.getElementById("memberForm");
    const list = document.getElementById("membersList");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const phone = document.getElementById("phone").value;
      const dept = document.getElementById("department").value;

      const li = document.createElement("li");
      li.textContent = name + " - " + phone + " - " + dept;

      list.appendChild(li);

      form.reset();
    });
  </script>

</body>
</html>
